<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gear Ratio Calculator</title>
    <style>
        :root { --gear-primary: #f59e0b; --gear-secondary: #d97706; --bg-slate: #f1f5f9; }
        .tool-wrapper { font-family: 'Segoe UI', sans-serif; background: var(--bg-slate); padding: 40px 20px; min-height: 100vh; }
        .tool-card { background: #ffffff; max-width: 650px; margin: 0 auto; border-radius: 24px; box-shadow: 0 20px 25px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #e2e8f0; }
        .tool-header { background: linear-gradient(135deg, var(--gear-primary), var(--gear-secondary)); padding: 30px; text-align: center; color: white; }
        .tool-nav { text-align: center; margin-bottom: 20px; font-weight: bold; }
        .tool-nav a { color: white; text-decoration: none; margin: 0 10px; opacity: 0.8; }
        .tool-nav a.active { opacity: 1; border-bottom: 2px solid white; }
        .tool-body { padding: 40px; }
        .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .gear-input { width: 100%; padding: 12px; border: 2px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; }
        .calc-btn { width: 100%; padding: 15px; background: var(--gear-secondary); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; }
        .gear-result { margin-top: 25px; padding: 20px; background: #fffbeb; border-radius: 15px; display: none; text-align: center; }
    </style>
</head>
<body>
    <div class="tool-wrapper">
        <div class="tool-card">
            <div class="tool-header">
                <div class="tool-nav">
                    <a href="index.html">Unit Converter</a> | 
                    <a href="gear-ratio.html" class="active">Gear Ratio</a>
                </div>
                <h1>Gear Ratio Calculator</h1>
                <p>Mechanical Advantage & Speed</p>
            </div>
            <div class="tool-body">
                <div class="input-row">
                    <div><label>Driver Teeth (T1)</label><input type="number" id="t1" class="gear-input"></div>
                    <div><label>Driven Teeth (T2)</label><input type="number" id="t2" class="gear-input"></div>
                </div>
                <button class="calc-btn" onclick="calculateGear()">Calculate Now</button>
                <div id="gearResult" class="gear-result">
                    <span style="color:#b45309; font-weight:bold;">Ratio: </span>
                    <span id="ratioVal" style="font-size:24px; font-weight:bold;"></span>
                </div>
            </div>
        </div>
    </div>
    <script>
        function calculateGear() {
            const t1 = parseFloat(document.getElementById('t1').value);
            const t2 = parseFloat(document.getElementById('t2').value);
            if (isNaN(t1) || isNaN(t2)) return;
            const ratio = t2 / t1;
            document.getElementById('ratioVal').innerHTML = ratio.toFixed(2) + " : 1";
            document.getElementById('gearResult').style.display = 'block';
        }
    </script>
</body>
</html>
