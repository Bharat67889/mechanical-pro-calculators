<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mechanical Unit Converter Pro</title>
    <style>
        :root { --primary-color: #2563eb; --secondary-color: #1e40af; --bg-color: #f8fafc; --text-dark: #1e293b; --card-bg: #ffffff; }
        .tool-wrapper { font-family: 'Inter', sans-serif; background: var(--bg-color); padding: 40px 20px; color: var(--text-dark); min-height: 100vh; }
        .tool-card { background: var(--card-bg); max-width: 700px; margin: 0 auto; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #e2e8f0; }
        .tool-header { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); padding: 30px; text-align: center; color: white; }
        .tool-nav { text-align: center; margin-bottom: 20px; font-weight: bold; }
        .tool-nav a { color: white; text-decoration: none; margin: 0 10px; opacity: 0.8; }
        .tool-nav a.active { opacity: 1; border-bottom: 2px solid white; }
        .tool-body { padding: 40px; }
        .input-group { margin-bottom: 25px; }
        .input-group label { display: block; font-weight: 600; margin-bottom: 10px; font-size: 14px; color: #64748b; text-transform: uppercase; }
        .tool-input, .tool-select { width: 100%; padding: 15px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 16px; box-sizing: border-box; }
        .result-section { margin-top: 30px; padding: 25px; background: #eff6ff; border-radius: 15px; text-align: center; display: none; }
        .result-value { font-size: 32px; font-weight: 800; color: var(--secondary-color); margin-top: 10px; display: block; }
    </style>
</head>
<body>
    <div class="tool-wrapper">
        <div class="tool-card">
            <div class="tool-header">
                <div class="tool-nav">
                    <a href="index.html" class="active">Unit Converter</a> | 
                    <a href="gear-ratio.html">Gear Ratio</a>
                </div>
                <h1>Unit Converter Pro</h1>
                <p>High-Precision Torque & Pressure</p>
            </div>
            <div class="tool-body">
                <div class="input-group">
                    <label>Enter Value</label>
                    <input type="number" id="mainInput" class="tool-input" oninput="calculate()">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="input-group">
                        <label>From</label>
                        <select id="fromUnit" class="tool-select" onchange="calculate()">
                            <option value="bar">Bar</option>
                            <option value="psi">PSI</option>
                            <option value="pascal">Pascal</option>
                            <option value="nm">Nm</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>To</label>
                        <select id="toUnit" class="tool-select" onchange="calculate()">
                            <option value="pascal">Pascal</option>
                            <option value="bar">Bar</option>
                            <option value="psi">PSI</option>
                            <option value="nm">Nm</option>
                        </select>
                    </div>
                </div>
                <div id="resultBox" class="result-section">
                    <h3>Result</h3>
                    <span id="resultVal" class="result-value">0.00</span>
                </div>
            </div>
        </div>
    </div>
    <script>
        function calculate() {
            const val = parseFloat(document.getElementById('mainInput').value);
            const from = document.getElementById('fromUnit').value;
            const to = document.getElementById('toUnit').value;
            const resBox = document.getElementById('resultBox');
            const resVal = document.getElementById('resultVal');
            if (isNaN(val)) { resBox.style.display = 'none'; return; }
            let base = 0;
            if (from === 'pascal') base = val;
            else if (from === 'bar') base = val * 100000;
            else if (from === 'psi') base = val * 6894.757;
            else if (from === 'nm') base = val;
            let final = 0;
            if (to === 'pascal') final = base;
            else if (to === 'bar') final = base / 100000;
            else if (to === 'psi') final = base / 6894.757;
            else if (to === 'nm') final = base;
            resVal.innerHTML = final.toFixed(4) + " " + to.toUpperCase();
            resBox.style.display = 'block';
        }
    </script>
</body>
</html>
